name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Three independent jobs so lint / types / tests report separately on every
# push — a mypy failure never masks a test regression (and vice versa). Each
# job installs via pip cache, so the duplicated setup is cheap.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy src/warehouse

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Pandoc + PDF engine (report writer)
        # System binaries the report writer shells out to — not pip packages.
        # Present so the @pytest.mark.pandoc external-PDF test runs in CI.
        run: sudo apt-get update && sudo apt-get install -y pandoc weasyprint
      - name: Install dependencies
        run: |
          python -m pip install --upgrade 'pip>=26.1.2'
          pip install -e ".[dev]"
      - name: Tests, coverage, and testing report
        run: |
          mkdir -p runs/testing
          warehouse test report
      - name: Security — pip-audit (HIGH/CRITICAL)
        run: python -m warehouse.infra.security_gate pip-audit
      - name: Security — detect-secrets
        run: python -m warehouse.infra.security_gate detect-secrets
      - name: Upload testing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testing-report
          path: |
            runs/testing/coverage.json
            runs/testing/last_report.json
            runs/testing/e2e_smoke.json
          retention-days: 7
          if-no-files-found: warn
